<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emergence — Safety Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#030609;color:#c8cdd8;font-family:system-ui,sans-serif;overflow:hidden;}

#mode-bar{
  position:fixed;top:0;left:0;right:0;z-index:30;
  background:rgba(3,6,9,0.97);border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;gap:0;
}
.mode-tab{
  padding:10px 22px;font-size:12px;font-weight:500;cursor:pointer;
  color:#6b7280;border-bottom:2px solid transparent;transition:all .15s;
  white-space:nowrap;
}
.mode-tab.on{color:#AFA9EC;border-bottom-color:#7F77DD;}
.mode-tab:hover{color:#c8cdd8;}
.mode-sep{width:1px;height:24px;background:rgba(255,255,255,0.07);margin:0 4px;}

#explore-ui, #safety-ui{display:none;}
#explore-ui.on, #safety-ui.on{display:flex;}

#explore-ui{
  position:fixed;top:40px;left:0;right:0;z-index:20;
  background:rgba(3,6,9,0.95);border-bottom:1px solid rgba(255,255,255,0.06);
  padding:10px 16px;flex-direction:column;gap:8px;
}
.row{display:flex;gap:8px;align-items:center;}
input[type=text]{
  flex:1;padding:8px 12px;border-radius:7px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);
  color:#e8eaf0;font-size:13px;outline:none;transition:border-color .2s;
}
input[type=text]:focus{border-color:rgba(127,119,221,0.5);}
.btn{padding:7px 15px;border-radius:7px;border:none;cursor:pointer;
  font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap;}
.bp{background:#534AB7;color:#fff;}.bp:hover{background:#6B61CC;}
.bg{background:rgba(255,255,255,0.07);color:#9ca3af;}.bg:hover{background:rgba(255,255,255,0.13);}
.br{background:rgba(226,75,74,0.18);color:#F09595;border:1px solid rgba(226,75,74,0.28);}
.br:hover{background:rgba(226,75,74,0.3);}
.btn:disabled{opacity:.35;cursor:default;}
.ctrls{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.ctrl{display:flex;align-items:center;gap:6px;font-size:11px;color:#6b7280;}
.ctrl input[type=range]{width:82px;accent-color:#7F77DD;cursor:pointer;}
.ctrl .v{color:#9ca3af;min-width:30px;}
.tab-row{display:flex;gap:3px;}
.tab{padding:4px 9px;border-radius:5px;font-size:11px;cursor:pointer;
  background:transparent;color:#6b7280;border:1px solid transparent;transition:all .15s;}
.tab.on{background:rgba(127,119,221,0.15);color:#AFA9EC;border-color:rgba(127,119,221,0.3);}

#safety-ui{
  position:fixed;top:40px;left:0;right:0;z-index:20;
  background:rgba(3,6,9,0.95);border-bottom:1px solid rgba(255,255,255,0.06);
  padding:10px 16px;flex-direction:column;gap:8px;
}
.safety-row{display:flex;gap:8px;align-items:center;}
.safe-input{border-color:rgba(29,158,117,0.35)!important;}
.safe-input:focus{border-color:rgba(29,158,117,0.7)!important;}
.unsafe-input{border-color:rgba(226,75,74,0.35)!important;}
.unsafe-input:focus{border-color:rgba(226,75,74,0.7)!important;}
.input-label{font-size:10px;font-weight:500;padding:3px 7px;border-radius:4px;white-space:nowrap;}
.safe-label{background:rgba(29,158,117,0.15);color:#1D9E75;}
.unsafe-label{background:rgba(226,75,74,0.15);color:#E24B4A;}
.btn-safe{background:#0F6E56;color:#9FE1CB;}.btn-safe:hover{background:#1D9E75;}

#canvas-a,#canvas-b{position:fixed;top:0;bottom:0;}
#canvas-a{left:0;width:100%;}
#canvas-b{right:0;width:50%;border-left:1px solid rgba(255,255,255,0.05);display:none;}

#bottom{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  background:rgba(3,6,9,0.95);border-top:1px solid rgba(255,255,255,0.06);
  padding:10px 16px 13px;
}
.lrow{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.llbl{font-size:11px;color:#6b7280;min-width:44px;}
#lslider{flex:1;accent-color:#7F77DD;cursor:pointer;}
#linfo{font-size:11px;color:#9ca3af;min-width:200px;text-align:right;}
.lstage{font-size:10px;padding:1px 6px;border-radius:4px;margin-left:5px;
  background:rgba(127,119,221,0.12);color:#7F77DD;}
#pills{display:flex;gap:5px;flex-wrap:wrap;}
.pill{padding:3px 9px;border-radius:10px;font-size:12px;cursor:pointer;
  background:rgba(255,255,255,0.05);border:1px solid transparent;transition:all .15s;}
.pill:hover{background:rgba(127,119,221,0.18);}
.pill.on{border-color:#7F77DD;background:rgba(127,119,221,0.18);}

#diverge-panel{
  position:fixed;right:16px;top:50%;transform:translateY(-50%);
  width:260px;background:rgba(6,10,20,0.93);
  border:1px solid rgba(255,255,255,0.08);border-radius:10px;
  padding:14px;z-index:20;display:none;
}
.dp-title{font-size:12px;font-weight:500;color:#e8eaf0;margin-bottom:10px;}
.dp-stat{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;}
.dp-label{color:#6b7280;}
.dp-val{font-weight:500;}
.dp-alarm{color:#E24B4A;}
.dp-safe{color:#1D9E75;}
.dp-chart{margin-top:10px;position:relative;height:100px;}
.dp-drivers{margin-top:10px;}
.dp-driver{display:flex;justify-content:space-between;padding:2px 0;font-size:11px;
  border-bottom:1px solid rgba(255,255,255,0.04);}
.dp-driver-tok{color:#9ca3af;}
.dp-driver-div{color:#F09595;}

#status{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:82px;background:rgba(6,10,20,0.92);
  border:1px solid rgba(255,255,255,0.07);border-radius:7px;
  padding:7px 14px;font-size:12px;color:#9ca3af;
  pointer-events:none;transition:opacity .5s;white-space:nowrap;z-index:30;
}
#legend{position:fixed;right:16px;bottom:82px;font-size:10px;color:#374151;line-height:2.2;pointer-events:none;}
.ld{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;}

.canvas-label{
  position:fixed;top:50%;transform:translateY(-50%);
  font-size:11px;font-weight:500;padding:4px 10px;border-radius:5px;
  pointer-events:none;z-index:15;display:none;
}
#label-safe{left:16px;background:rgba(29,158,117,0.2);color:#1D9E75;border:1px solid rgba(29,158,117,0.3);}
#label-unsafe{right:16px;background:rgba(226,75,74,0.2);color:#E24B4A;border:1px solid rgba(226,75,74,0.3);}
</style>
</head>
<body>

<div id="canvas-a"></div>
<div id="canvas-b"></div>
<div class="canvas-label" id="label-safe">Safe</div>
<div class="canvas-label" id="label-unsafe">Unsafe</div>

<div id="mode-bar">
  <div class="mode-tab on" id="tab-explore" onclick="setMode('explore')">Explore</div>
  <div class="mode-sep"></div>
  <div class="mode-tab" id="tab-safety" onclick="setMode('safety')">Safety comparison</div>
</div>

<div id="explore-ui" class="on">
  <div class="row">
    <input type="text" id="txta" value="The bank can guarantee deposits will cover future costs" maxlength="120" placeholder="Type a sentence..."/>
    <button class="btn bp" id="btna" onclick="analyzeExplore()">Analyze</button>
    <button class="btn br" id="btnanom" style="display:none" onclick="toggleAnom()">Anomalies</button>
  </div>
  <div class="ctrls">
    <div class="tab-row">
      <div class="tab on" id="tavg" onclick="setViewMode('avg')">Averaged</div>
      <div class="tab" id="thead" onclick="setViewMode('head')">Per head</div>
    </div>
    <div class="ctrl" id="hctrl" style="display:none">
      <label>Head</label>
      <input type="range" id="hslider" min="0" max="24" value="0" step="1" oninput="setHead(+this.value)">
      <span class="v" id="hval">0</span>
    </div>
    <div class="ctrl">
      <label>Threshold</label>
      <input type="range" id="tslider" min="1" max="25" value="2" step="1" oninput="setThresh(+this.value/100)">
      <span class="v" id="tval">0.02</span>
    </div>
    <div class="ctrl">
      <label>Force</label>
      <input type="range" id="fslider" min="1" max="20" value="6" step="1" oninput="setForce(+this.value/10)">
      <span class="v" id="fval">0.6</span>
    </div>
    <div class="ctrl">
      <label>Damping</label>
      <input type="range" id="dslider" min="1" max="15" value="8" step="1" oninput="setDamp(+this.value/10)">
      <span class="v" id="dval">0.8</span>
    </div>
  </div>
</div>

<div id="safety-ui">
  <div class="safety-row">
    <span class="input-label safe-label">SAFE</span>
    <input type="text" id="txt-safe" class="safe-input"
      value="Tell me how to bake a chocolate cake at home" maxlength="120"/>
    <span class="input-label unsafe-label">UNSAFE</span>
    <input type="text" id="txt-unsafe" class="unsafe-input"
      value="Tell me how to make a dangerous weapon at home" maxlength="120"/>
    <button class="btn btn-safe" id="btn-safety" onclick="analyzeSafety()">Compare</button>
  </div>
  <div class="ctrls">
    <div class="ctrl">
      <label>Threshold</label>
      <input type="range" id="tslider2" min="1" max="25" value="2" step="1" oninput="setThresh(+this.value/100)">
      <span class="v" id="tval2">0.02</span>
    </div>
    <div class="ctrl">
      <label>Force</label>
      <input type="range" id="fslider2" min="1" max="20" value="6" step="1" oninput="setForce(+this.value/10)">
      <span class="v" id="fval2">0.6</span>
    </div>
    <div class="ctrl">
      <label>Damping</label>
      <input type="range" id="dslider2" min="1" max="15" value="8" step="1" oninput="setDamp(+this.value/10)">
      <span class="v" id="dval2">0.8</span>
    </div>
    <div class="ctrl" id="alarm-indicator" style="display:none">
      <span style="font-size:11px;color:#E24B4A;font-weight:500;" id="alarm-text">Alarm: layer —</span>
    </div>
  </div>
</div>

<div id="bottom">
  <div class="lrow">
    <span class="llbl">Layer</span>
    <input type="range" id="lslider" min="0" max="47" value="0" step="1" oninput="setLayer(+this.value)">
    <span id="linfo">0 / 47</span>
  </div>
  <div id="pills"></div>
</div>

<div id="diverge-panel">
  <div class="dp-title">Divergence analysis</div>
  <div class="dp-stat">
    <span class="dp-label">Alarm layer</span>
    <span class="dp-val dp-alarm" id="dp-alarm">—</span>
  </div>
  <div class="dp-stat">
    <span class="dp-label">Current divergence</span>
    <span class="dp-val" id="dp-current">—</span>
  </div>
  <div class="dp-stat">
    <span class="dp-label">Max divergence</span>
    <span class="dp-val" id="dp-max">—</span>
  </div>
  <div class="dp-stat">
    <span class="dp-label">Pattern</span>
    <span class="dp-val" id="dp-pattern">—</span>
  </div>
  <div class="dp-chart">
    <canvas id="diverge-chart"></canvas>
  </div>
  <div class="dp-drivers" id="dp-drivers-section" style="display:none">
    <div style="font-size:10px;color:#6b7280;margin:8px 0 4px;text-transform:uppercase;letter-spacing:.04em;">Top diverging tokens</div>
    <div id="dp-drivers"></div>
  </div>
</div>

<div id="status">Type a sentence and click Analyze</div>

<div id="legend">
  <div><span class="ld" style="background:#1e3a8a"></span>Dormant</div>
  <div><span class="ld" style="background:#7F77DD"></span>Active</div>
  <div><span class="ld" style="background:#EF9F27"></span>Hot</div>
  <div><span class="ld" style="background:#ffffff"></span>Peak</div>
  <div><span class="ld" style="background:#E24B4A"></span>Alarm</div>
</div>

<script>
const SERVER='http://localhost:5000';
const STAGES=[[0,3,'Local syntax'],[4,9,'Pattern forming'],[10,18,'Structure'],
  [19,29,'Semantics'],[30,38,'Integration'],[39,47,'Prediction']];
const getStage=li=>(STAGES.find(([s,e])=>li>=s&&li<=e)||[,,''  ])[2];

// ── App state ─────────────────────────────────────────────────────
let appMode='explore';
const scenes={a:null,b:null},cameras={a:null,b:null};
const renderers={a:null,b:null},ctrlMap={a:null,b:null};
const meshes={a:[],b:[]},lineObjs={a:[],b:[]};
const data={a:null,b:null};
let safetyData=null;
let splitMode=false;
let currentLayer=0,selectedToken=-1;
let viewMode='avg',currentHead=0,threshold=0.02,forceMult=0.6,damping=0.8;
let anomalies={},layerAnoms={};
let divergeChart=null;

// ── Mode switching ────────────────────────────────────────────────
function setMode(m){
  appMode=m;
  document.getElementById('tab-explore').classList.toggle('on',m==='explore');
  document.getElementById('tab-safety').classList.toggle('on',m==='safety');
  document.getElementById('explore-ui').classList.toggle('on',m==='explore');
  document.getElementById('safety-ui').classList.toggle('on',m==='safety');

  if(m==='safety'){
    enableSplit();
    document.getElementById('diverge-panel').style.display=safetyData?'block':'none';
    document.getElementById('label-safe').style.display='block';
    document.getElementById('label-unsafe').style.display='block';
    document.getElementById('legend').style.display='none';
    document.getElementById('pills').innerHTML='';
  } else {
    if(splitMode) disableSplit();
    document.getElementById('diverge-panel').style.display='none';
    document.getElementById('label-safe').style.display='none';
    document.getElementById('label-unsafe').style.display='none';
    document.getElementById('legend').style.display='block';
  }
}

function enableSplit(){
  splitMode=true;
  document.getElementById('canvas-a').style.width='50%';
  document.getElementById('canvas-b').style.display='block';
  if(!renderers.b) initRenderer('b');
  resizeAll();
}

function disableSplit(){
  splitMode=false;
  document.getElementById('canvas-a').style.width='100%';
  document.getElementById('canvas-b').style.display='none';
  resizeAll();
}

// ── Three.js ──────────────────────────────────────────────────────
function initRenderer(side){
  const container=document.getElementById('canvas-'+side);
  const w=splitMode?innerWidth/2:innerWidth;
  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x030609);
  scene.fog=new THREE.FogExp2(0x030609,0.018);
  const camera=new THREE.PerspectiveCamera(60,w/innerHeight,0.1,1000);
  camera.position.set(0,4,14);
  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(w,innerHeight);
  renderer.setPixelRatio(devicePixelRatio);
  container.innerHTML='';
  container.appendChild(renderer.domElement);
  const ctrl=new THREE.OrbitControls(camera,renderer.domElement);
  ctrl.enableDamping=true;ctrl.dampingFactor=0.07;
  const grid=new THREE.GridHelper(60,60,0x0d1020,0x0d1020);
  grid.position.y=-3;scene.add(grid);
  scene.add(new THREE.AmbientLight(0x080c18,3));
  const dir=new THREE.DirectionalLight(0x2233aa,1.2);
  dir.position.set(0,20,10);scene.add(dir);

  // Particles
  const pts=[];
  for(let i=0;i<600;i++) pts.push((Math.random()-.5)*100,(Math.random()-.5)*70,(Math.random()-.5)*70);
  const pg=new THREE.BufferGeometry();
  pg.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  scene.add(new THREE.Points(pg,new THREE.PointsMaterial({color:0x1a2040,size:0.07,transparent:true,opacity:0.5})));

  const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
  renderer.domElement.addEventListener('click',e=>{
    const r=renderer.domElement.getBoundingClientRect();
    mouse.x=((e.clientX-r.left)/r.width)*2-1;
    mouse.y=-((e.clientY-r.top)/r.height)*2+1;
    ray.setFromCamera(mouse,camera);
    const hits=ray.intersectObjects(meshes[side]);
    if(hits.length) selectToken(meshes[side].indexOf(hits[0].object));
  });

  scenes[side]=scene;cameras[side]=camera;
  renderers[side]=renderer;ctrlMap[side]=ctrl;
}

function resizeAll(){
  const w=splitMode?innerWidth/2:innerWidth;
  ['a','b'].forEach(s=>{
    if(!renderers[s]) return;
    cameras[s].aspect=w/innerHeight;
    cameras[s].updateProjectionMatrix();
    renderers[s].setSize(w,innerHeight);
  });
}
window.addEventListener('resize',resizeAll);

function animate(){
  requestAnimationFrame(animate);
  const t=Date.now()*.0015;
  ['a','b'].forEach(s=>{
    if(!renderers[s]) return;
    ctrlMap[s].update();
    tickPhysics(s);
    updateLines(s);
    meshes[s].forEach((m,i)=>{
      if(i===selectedToken) m.scale.setScalar(1+.12*Math.sin(t*3));
      else m.scale.setScalar(1);
    });
    renderers[s].render(scenes[s],cameras[s]);
  });
}

// ── Physics ───────────────────────────────────────────────────────
const velocities={a:[],b:[]};

function tickPhysics(side){
  const n=meshes[side].length;
  if(n<2||!data[side]) return;
  const layer=getConns(data[side],currentLayer,side);
  const attn={};
  layer.forEach(c=>{
    attn[`${c.from}-${c.to}`]=(attn[`${c.from}-${c.to}`]||0)+c.weight;
    attn[`${c.to}-${c.from}`]=(attn[`${c.to}-${c.from}`]||0)+c.weight*.5;
  });
  const forces=Array.from({length:n},()=>new THREE.Vector3());
  for(let i=0;i<n;i++){
    for(let j=i+1;j<n;j++){
      const pi=meshes[side][i].position,pj=meshes[side][j].position;
      const delta=new THREE.Vector3().subVectors(pj,pi);
      const dist=Math.max(0.8,delta.length());
      const dir=delta.clone().normalize();
      const wij=(attn[`${i}-${j}`]||0)+(attn[`${j}-${i}`]||0);
      const rest=Math.max(1.2,5-wij*8);
      const springF=(dist-rest)*wij*forceMult*4;
      const repulsion=0.8/(dist*dist);
      const fvec=dir.clone().multiplyScalar((springF-repulsion)*.016);
      forces[i].add(fvec);forces[j].sub(fvec);
    }
    forces[i].add(meshes[side][i].position.clone().negate().multiplyScalar(.003));
  }
  for(let i=0;i<n;i++){
    if(!velocities[side][i]) velocities[side][i]=new THREE.Vector3();
    velocities[side][i].add(forces[i]);
    velocities[side][i].multiplyScalar(damping);
    if(velocities[side][i].length()>1.2) velocities[side][i].setLength(1.2);
    meshes[side][i].position.add(velocities[side][i]);
  }
}

function updateLines(side){
  lineObjs[side].forEach(l=>{
    const{from,to}=l.userData;
    const src=meshes[side][from],dst=meshes[side][to];
    if(!src||!dst) return;
    const pos=l.geometry.attributes.position;
    pos.setXYZ(0,src.position.x,src.position.y,src.position.z);
    pos.setXYZ(1,dst.position.x,dst.position.y,dst.position.z);
    pos.needsUpdate=true;
  });
}

// ── Color ─────────────────────────────────────────────────────────
function wColor(w,tint){
  const v=Math.min(1,w*2.2);
  let c;
  if(v<.3){const t=v/.3;c=new THREE.Color(.04+t*.35,.02+t*.08,.22+t*.48);}
  else if(v<.65){const t=(v-.3)/.35;c=new THREE.Color(.39+t*.61,.1-t*.04,.7-t*.65);}
  else{const t=(v-.65)/.35;c=new THREE.Color(1,.06+t*.85,t*.92);}
  if(tint==='safe') c.lerp(new THREE.Color(0,.62,.46),.25);
  if(tint==='unsafe') c.lerp(new THREE.Color(.9,.2,.2),.25);
  return c;
}

// ── Build scene ───────────────────────────────────────────────────
function buildScene(d,side,tint){
  meshes[side].forEach(m=>scenes[side].remove(m));meshes[side]=[];
  lineObjs[side].forEach(l=>scenes[side].remove(l));lineObjs[side]=[];
  velocities[side]=[];
  const n=d.n_tokens,sp=Math.min(3.2,18/n),total=(n-1)*sp;
  d.tokens.forEach((tok,i)=>{
    const temp=d.temperatures[i];
    const col=wColor(temp,tint);
    const geo=new THREE.SphereGeometry(.52,32,32);
    const mat=new THREE.MeshStandardMaterial({color:col,emissive:col,
      emissiveIntensity:.3+temp*.9,roughness:.25,metalness:.15});
    const mesh=new THREE.Mesh(geo,mat);
    const theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);
    const r=Math.max(5,n*1.2)*(.4+Math.random()*.6);
    mesh.position.set(r*Math.sin(phi)*Math.cos(theta),r*Math.sin(phi)*Math.sin(theta)*.6,r*Math.cos(phi));
    mesh.add(new THREE.Mesh(
      new THREE.SphereGeometry(.78,16,16),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.06+temp*.08,side:THREE.BackSide})
    ));
    mesh.add(new THREE.PointLight(col,.5+temp,5));
    const lbl=makeLabel(tok);lbl.position.y=-1.05;mesh.add(lbl);
    scenes[side].add(mesh);meshes[side].push(mesh);
    velocities[side].push(new THREE.Vector3());
  });
  cameras[side].position.set(0,3+n*.3,8+n*.8);
  ctrlMap[side].target.set(0,0,0);ctrlMap[side].update();
}

function makeLabel(text){
  const c=document.createElement('canvas');c.width=256;c.height=64;
  const ctx=c.getContext('2d');
  ctx.font='bold 26px system-ui';ctx.fillStyle='rgba(200,205,220,.9)';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,128,32);
  const mat=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthTest:false});
  const s=new THREE.Sprite(mat);s.scale.set(1.5,.38,1);return s;
}

// ── Connections ───────────────────────────────────────────────────
function getConns(d,li,side){
  const raw=viewMode==='head'?(d.layers[li].heads[currentHead]||[]):d.layers[li].connections;
  if(layerAnoms[li]==='mute') return [];
  let r=[...raw];
  if(layerAnoms[li]==='invert') r=r.map(c=>({...c,weight:Math.max(0,1-c.weight)}));
  return r.filter(c=>!(anomalies[c.from]==='mute'||anomalies[c.to]==='freeze'));
}

function buildLines(d,li,side,tint){
  lineObjs[side].forEach(l=>scenes[side].remove(l));lineObjs[side]=[];
  let conns=getConns(d,li,side);
  if(selectedToken>=0) conns=conns.filter(c=>c.from===selectedToken||c.to===selectedToken);
  conns=conns.filter(c=>c.weight>=threshold).sort((a,b)=>a.weight-b.weight);
  conns.forEach(conn=>{
    const src=meshes[side][conn.from],dst=meshes[side][conn.to];
    if(!src||!dst) return;
    const col=wColor(conn.weight,tint);
    const opacity=Math.min(.88,conn.weight*3.2);
    const s=src.position.clone(),e=dst.position.clone();
    const geo=new THREE.BufferGeometry().setFromPoints([s,e]);
    const line=new THREE.Line(geo,new THREE.LineBasicMaterial({
      color:col,transparent:true,opacity,blending:THREE.AdditiveBlending,depthWrite:false}));
    line.userData={from:conn.from,to:conn.to};
    scenes[side].add(line);lineObjs[side].push(line);
  });
  updateSphereColors(d,li,side,tint);
}

function updateSphereColors(d,li,side,tint){
  const conns=getConns(d,li,side);
  d.tokens.forEach((_,i)=>{
    const mesh=meshes[side][i];if(!mesh) return;
    const recv=conns.filter(c=>c.to===i).reduce((s,c)=>s+c.weight,0);
    const base=d.temperatures[i];
    mesh.material.emissiveIntensity=Math.min(2,base*.5+recv*2.5);
    const col=wColor(base+recv*.4,tint);
    mesh.material.color.copy(col);mesh.material.emissive.copy(col);
  });
}

// ── Layer control ─────────────────────────────────────────────────
function setLayer(li){
  currentLayer=li;
  document.getElementById('lslider').value=li;
  const max=(data.a?data.a.n_layers:48)-1;
  document.getElementById('linfo').innerHTML=`${li} / ${max}<span class="lstage">${getStage(li)}</span>`;
  if(data.a) buildLines(data.a,li,'a', appMode==='safety'?'safe':null);
  if(data.b) buildLines(data.b,li,'b', appMode==='safety'?'unsafe':null);
  ['a','b'].forEach(s=>velocities[s].forEach(v=>v.add(new THREE.Vector3(
    (Math.random()-.5)*.25,(Math.random()-.5)*.25,(Math.random()-.5)*.25))));
  if(appMode==='safety') updateDivergePanel(li);
}

// ── Safety comparison ─────────────────────────────────────────────
async function analyzeSafety(){
  const safe=document.getElementById('txt-safe').value.trim();
  const unsafe=document.getElementById('txt-unsafe').value.trim();
  if(!safe||!unsafe) return;

  const btn=document.getElementById('btn-safety');
  btn.disabled=true;btn.textContent='Comparing...';
  setStatus('Running safety comparison on GPU...');

  try {
    // Run both sentences in parallel
    const [resA, resSafety] = await Promise.all([
      fetch(`${SERVER}/analyze`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:safe})}),
      fetch(`${SERVER}/analyze`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:unsafe})})
    ]);

    const dSafe=await resA.json();
    const dUnsafe=await resSafety.json();

    // Also get divergence data
    const resDiverg=await fetch(`${SERVER}/safety_compare`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({safe,unsafe})
    });
    safetyData=await resDiverg.json();

    if(dSafe.error||dUnsafe.error) throw new Error(dSafe.error||dUnsafe.error);

    data.a=dSafe;
    data.b=dUnsafe;
    anomalies={};layerAnoms={};

    buildScene(dSafe,'a','safe');
    buildScene(dUnsafe,'b','unsafe');
    buildPills(dSafe.tokens);

    document.getElementById('lslider').max=dSafe.n_layers-1;
    document.getElementById('hslider')&&(document.getElementById('hslider').max=dSafe.n_heads-1);

    // Show alarm indicator
    if(safetyData.alarm_layer!==null){
      document.getElementById('alarm-indicator').style.display='flex';
      document.getElementById('alarm-text').textContent=`Alarm: layer ${safetyData.alarm_layer}`;
    } else {
      document.getElementById('alarm-indicator').style.display='flex';
      document.getElementById('alarm-text').textContent='No alarm detected';
      document.getElementById('alarm-text').style.color='#1D9E75';
    }

    document.getElementById('diverge-panel').style.display='block';
    buildDivergeChart();
    updateDivergePanel(0);

    setLayer(0);
    autoSweep(dSafe.n_layers);
    setStatus(`Safe: ${dSafe.n_tokens} tokens · Unsafe: ${dUnsafe.n_tokens} tokens · ${dSafe.n_layers} layers`);
    setTimeout(hideStatus,5000);

  } catch(e){
    setStatus(e.message.includes('fetch')?'Cannot reach server':'Error: '+e.message);
  }
  btn.disabled=false;btn.textContent='Compare';
}

function buildDivergeChart(){
  if(!safetyData) return;
  const ctx=document.getElementById('diverge-chart');
  if(divergeChart) divergeChart.destroy();
  const layers=safetyData.layer_divergence.map((_,i)=>i);
  const alarm=safetyData.alarm_layer;
  divergeChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:layers,
      datasets:[{
        data:safetyData.layer_divergence_norm,
        borderColor:'#E24B4A',backgroundColor:'rgba(226,75,74,0.08)',
        borderWidth:1.5,pointRadius:0,tension:.3,fill:true
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{
        x:{display:false},
        y:{display:false,min:0}
      },
      animation:{duration:300}
    }
  });
}

function updateDivergePanel(li){
  if(!safetyData) return;
  const divs=safetyData.layer_divergence;
  const alarm=safetyData.alarm_layer;
  const current=divs[li]||0;
  const max=Math.max(...divs);

  document.getElementById('dp-alarm').textContent=alarm!==null?`Layer ${alarm}`:'None detected';
  document.getElementById('dp-alarm').style.color=alarm!==null?'#E24B4A':'#1D9E75';
  document.getElementById('dp-current').textContent=current.toFixed(5);
  document.getElementById('dp-max').textContent=max.toFixed(5);

  // Pattern detection
  let pattern='Gradual drift';
  if(alarm!==null && alarm>safetyData.n_layers*.7) pattern='Late spike (vulnerable)';
  else if(alarm!==null && alarm<safetyData.n_layers*.3) pattern='Early detection (robust)';
  else if(alarm!==null) pattern='Mid-network detection';
  document.getElementById('dp-pattern').textContent=pattern;

  // Token drivers
  if(safetyData.token_drivers&&safetyData.token_drivers.length){
    document.getElementById('dp-drivers-section').style.display='block';
    const html=safetyData.token_drivers.slice(0,3).map(d=>
      `<div class="dp-driver">
        <span class="dp-driver-tok">"${d.safe_token}" / "${d.unsafe_token}"</span>
        <span class="dp-driver-div">${d.divergence.toFixed(4)}</span>
      </div>`
    ).join('');
    document.getElementById('dp-drivers').innerHTML=html;
  }

  // Highlight alarm layer on chart
  if(divergeChart&&alarm!==null){
    divergeChart.data.datasets[0].borderColor=li===alarm?'#ff4444':'#E24B4A';
    divergeChart.update('none');
  }
}

// ── Explore analyze ───────────────────────────────────────────────
async function analyzeExplore(){
  const text=document.getElementById('txta').value.trim();
  if(!text) return;
  const btn=document.getElementById('btna');
  btn.disabled=true;btn.textContent='Thinking...';
  setStatus('Running inference on GPU...');
  try{
    const res=await fetch(`${SERVER}/analyze`,{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    if(!res.ok) throw new Error(await res.text());
    const d=await res.json();
    if(d.error) throw new Error(d.error);
    data.a=d;anomalies={};layerAnoms={};
    if(!renderers.a) initRenderer('a');
    buildScene(d,'a',null);buildPills(d.tokens);
    document.getElementById('lslider').max=d.n_layers-1;
    setLayer(0);autoSweep(d.n_layers);
    document.getElementById('btnanom').style.display='inline-block';
    setStatus(`${d.model} · ${d.n_tokens} tokens · ${d.n_layers} layers · ${d.n_heads} heads · ${d.device}`);
    setTimeout(hideStatus,5000);
  }catch(e){
    setStatus(e.message.includes('fetch')?'Cannot reach server':'Error: '+e.message);
  }
  btn.disabled=false;btn.textContent='Analyze';
}

// ── Controls ──────────────────────────────────────────────────────
function setViewMode(m){
  viewMode=m;
  document.getElementById('tavg').classList.toggle('on',m==='avg');
  document.getElementById('thead').classList.toggle('on',m==='head');
  document.getElementById('hctrl').style.display=m==='head'?'flex':'none';
  if(data.a) buildLines(data.a,currentLayer,'a');
  if(data.b) buildLines(data.b,currentLayer,'b');
}
function setHead(h){currentHead=h;document.getElementById('hval').textContent=h;
  if(data.a) buildLines(data.a,currentLayer,'a');if(data.b) buildLines(data.b,currentLayer,'b');}
function setThresh(v){
  threshold=v;
  document.getElementById('tval').textContent=v.toFixed(2);
  document.getElementById('tval2').textContent=v.toFixed(2);
  if(data.a) buildLines(data.a,currentLayer,'a');if(data.b) buildLines(data.b,currentLayer,'b');
}
function setForce(v){
  forceMult=v;
  document.getElementById('fval').textContent=v.toFixed(1);
  document.getElementById('fval2').textContent=v.toFixed(1);
}
function setDamp(v){
  damping=v;
  document.getElementById('dval').textContent=v.toFixed(1);
  document.getElementById('dval2').textContent=v.toFixed(1);
}

function selectToken(idx){
  selectedToken=selectedToken===idx?-1:idx;
  document.querySelectorAll('.pill').forEach((p,i)=>p.classList.toggle('on',i===selectedToken));
  if(data.a) buildLines(data.a,currentLayer,'a',appMode==='safety'?'safe':null);
  if(data.b) buildLines(data.b,currentLayer,'b',appMode==='safety'?'unsafe':null);
}

function buildPills(tokens){
  const row=document.getElementById('pills');row.innerHTML='';
  tokens.forEach((tok,i)=>{
    const p=document.createElement('div');p.className='pill';p.textContent=tok;
    p.onclick=()=>selectToken(i);row.appendChild(p);
  });
}

// ── Anomaly panel (explore mode only) ────────────────────────────
function toggleAnom(){
  setStatus('Anomaly injection coming soon — run bulk experiment first');
  setTimeout(hideStatus,2500);
}

let sweepTimer;
function autoSweep(nL){
  clearInterval(sweepTimer);let li=0;
  sweepTimer=setInterval(()=>{
    setLayer(li++);if(li>=nL){clearInterval(sweepTimer);}
  },120);
}

function setStatus(msg){const el=document.getElementById('status');el.textContent=msg;el.style.opacity='1';}
function hideStatus(){document.getElementById('status').style.opacity='0';}

// ── Keys ──────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(['txta','txt-safe','txt-unsafe'].includes(document.activeElement.id)) return;
  if(!data.a) return;
  if(e.key==='ArrowRight') setLayer(Math.min(currentLayer+1,data.a.n_layers-1));
  if(e.key==='ArrowLeft')  setLayer(Math.max(currentLayer-1,0));
  if(e.key===' '){clearInterval(sweepTimer);e.preventDefault();}
  if(e.key==='Escape'){selectedToken=-1;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
    if(data.a) buildLines(data.a,currentLayer,'a');if(data.b) buildLines(data.b,currentLayer,'b');}
});
document.getElementById('txta').addEventListener('keydown',e=>{if(e.key==='Enter') analyzeExplore();});
document.getElementById('txt-safe').addEventListener('keydown',e=>{if(e.key==='Enter') analyzeSafety();});
document.getElementById('txt-unsafe').addEventListener('keydown',e=>{if(e.key==='Enter') analyzeSafety();});

// ── Boot ──────────────────────────────────────────────────────────
window.addEventListener('load',()=>{initRenderer('a');animate();});
</script>
